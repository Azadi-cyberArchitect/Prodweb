<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZADI — Anmeldung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --bg-alt:#f4f6f8; --line:#e2e6eb;
    --navy:#12233f; --steel:#5b6472; --blue:#2e86c1;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg-alt); color:var(--navy); font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    background:#fff; border:1px solid var(--line); max-width:400px; width:100%;
    padding:40px 36px;
  }
  .logo{display:flex; justify-content:center; margin-bottom:24px;}
  .logo img{height:32px;}
  h1{font-family:'Space Grotesk', sans-serif; font-size:1.3rem; text-align:center; margin-bottom:8px;}
  .sub{text-align:center; color:var(--steel); font-size:0.9rem; margin-bottom:32px;}
  .providers{display:flex; flex-direction:column; gap:12px;}
  .provider-btn{
    display:flex; align-items:center; justify-content:center; gap:10px;
    border:1px solid var(--line); padding:13px 16px; font-size:0.94rem; font-weight:500;
    color:var(--navy); background:#fff; transition:border-color .2s, background .2s;
    text-decoration:none;
  }
  .provider-btn:hover{border-color:var(--blue); background:#f7fbfe;}
  .provider-btn .dot{width:9px; height:9px; flex:none;}
  .dot.ms{background:#2e86c1;}
  .dot.google{background:#e05a47;}
  .dot.facebook{background:#3a5a9c;}
  .dot.auth0{background:#7cb342;}
  .note{margin-top:28px; text-align:center; font-size:0.8rem; color:var(--steel);}
  .note a{color:var(--blue);}
</style>
</head>
<body>

  <div class="card">
    <div class="logo"><img src="/assets/azadi-logo.jpg" alt="AZADI"></div>
    <h1>Anmelden bei AZADI</h1>
    <p class="sub">Wähle deinen Anmeldeanbieter, um auf das Kundenportal zuzugreifen.</p>

    <div class="providers" id="providers">
      <a class="provider-btn" data-provider="aad" href="#"><span class="dot ms"></span> Mit Microsoft anmelden</a>
      <a class="provider-btn" data-provider="google" href="#"><span class="dot google"></span> Mit Google anmelden</a>
      <a class="provider-btn" data-provider="facebook" href="#"><span class="dot facebook"></span> Mit Facebook anmelden</a>
    </div>

    <p class="note">Beim Login über Microsoft wird — abhängig von der Sicherheitsrichtlinie deines Unternehmens — zusätzlich ein zweiter Faktor (MFA) abgefragt.</p>
  </div>

<script>
  // Zielseite nach dem Login aus dem ?redirect= Parameter übernehmen (Standard: /portal/)
  const params = new URLSearchParams(window.location.search);
  const target = params.get('redirect') || '/portal/';

  document.querySelectorAll('.provider-btn').forEach(btn => {
    const provider = btn.dataset.provider;
    btn.href = '/.auth/login/' + provider + '?post_login_redirect_uri=' + encodeURIComponent(target);
  });
</script>

</body>
</html>
